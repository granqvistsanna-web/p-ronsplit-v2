<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="scoopGrad" x1="30" y1="10" x2="70" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="coneGrad" x1="40" y1="55" x2="60" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#4ade80"/>
  
  <!-- Ice cream scoop -->
  <path d="M50 12 
           C38 12, 28 22, 28 35 
           C28 42, 32 48, 38 52 
           C35 50, 32 52, 30 55 
           C35 58, 42 58, 50 58 
           C58 58, 65 58, 70 55 
           C68 52, 65 50, 62 52 
           C68 48, 72 42, 72 35 
           C72 22, 62 12, 50 12 Z" 
        fill="url(#scoopGrad)"/>
  
  <!-- Scoop highlight -->
  <ellipse cx="42" cy="28" rx="8" ry="5" fill="white" opacity="0.35" transform="rotate(-15 42 28)"/>
  
  <!-- Waffle cone -->
  <path d="M38 55 L62 55 L53 88 C52 90, 51 91, 50 91 C49 91, 48 90, 47 88 Z" fill="url(#coneGrad)"/>
  
  <!-- Cone texture lines -->
  <line x1="42" y1="62" x2="58" y2="62" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <line x1="44" y1="69" x2="56" y2="69" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <line x1="46" y1="76" x2="54" y2="76" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <line x1="48" y1="83" x2="52" y2="83" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  
  <!-- Diagonal waffle pattern -->
  <line x1="45" y1="58" x2="55" y2="72" stroke="#d97706" stroke-width="1" opacity="0.3"/>
  <line x1="55" y1="58" x2="45" y2="72" stroke="#d97706" stroke-width="1" opacity="0.3"/>
  <line x1="48" y1="72" x2="52" y2="78" stroke="#d97706" stroke-width="1" opacity="0.3"/>
  <line x1="52" y1="72" x2="48" y2="78" stroke="#d97706" stroke-width="1" opacity="0.3"/>
  
  <!-- Small cherry / decoration -->
  <circle cx="58" cy="18" r="5" fill="#ef4444"/>
  <circle cx="57" cy="16" r="1.5" fill="white" opacity="0.6"/>
  <path d="M58 13 C58 10, 60 8, 62 7" stroke="#7c2d12" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
